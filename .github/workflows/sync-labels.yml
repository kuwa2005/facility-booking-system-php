name: Sync Labels

on:
  push:
    branches: [ "main" ]
    paths:
      - ".github/labels.yml"
      - ".github/workflows/sync-labels.yml"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Sync labels from labels.yml
        uses: micnncim/action-label-syncer@v1
        with:
          manifest: .github/labels.yml
